<section class="iletisim-container">

<form class="iletisim-form"
      action="sonuc.php"
      method="POST">
        <h1>İletişim</h1>
		<p class="iletisim-aciklama">
Benimle iletişime geçmek için aşağıdaki formu doldurabilirsiniz.
</p>

        <label>Ad Soyad</label>
        <input type="text"
		id="adsoyad" 
		name="adsoyad"
		placeholder="Adınızı giriniz">

        <label>E-posta</label>
        <input type="email"
		id="email"
		name="email"
		placeholder="ornek@mail.com">
		
		<label>Telefon</label>
		<input type="text" 
		id="telefon"
		name="telefon"
		placeholder="05XXXXXXXXX">
		
			<label>Konu</label>
		
        <select id="konu" name="konu">
    <option value="">Konu Seçiniz</option>
    <option>Genel</option>
    <option>Proje</option>
    <option>Yazılım</option>
    <option>Diğer</option>
      </select>
	  
		<label>Cinsiyet</label>

<div class="radio-group">
    <label><input type="radio" name="cinsiyet"> Kadın</label>
    <label><input type="radio" name="cinsiyet"> Erkek</label>
</div>

<label>İlgi Alanları</label>

<div class="checkbox-group">
    <label><input type="checkbox"> Oyun</label>
    <label><input type="checkbox"> Anime</label>
    <label><input type="checkbox"> Yazılım</label>
    <label><input type="checkbox"> Müzik</label>
</div>

        <label>Mesaj</label>
		<textarea id="mesaj" name="mesaj" rows="5" placeholder="Mesajınızı yazınız"></textarea>
		
	<div class="butonlar">
    <button type="button" onclick="jsKontrol()">JavaScript Kontrol</button>
    <button type="button" onclick="vueKontrol()">Vue.js Kontrol</button>
	<button type="submit">PHP'ye Gönder</button>
    <button type="reset" class="temizle-btn">Temizle</button>
</div>

    </form>
	
	
</section>

<script>
function formKontrol() {
    let adsoyad = document.getElementById("adsoyad").value;
    let email = document.getElementById("email").value;
    let konu = document.getElementById("konu").value;
    let mesaj = document.getElementById("mesaj").value;

    if (adsoyad === "" || email === "" || konu === "" || mesaj === "") {
        alert("Lütfen tüm alanları doldurun.");
        return false;
    }

    alert("Form başarıyla gönderildi.");
    return true;
}
</script>
<script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

<script>
function jsKontrol() {
    const adsoyad = document.getElementById("adsoyad").value.trim();
    const email = document.getElementById("email").value.trim();
    const telefon = document.getElementById("telefon").value.trim();
    const konu = document.getElementById("konu").value;
    const mesaj = document.getElementById("mesaj").value.trim();

    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    const telefonRegex = /^[0-9]+$/;

    if (adsoyad === "" || email === "" || telefon === "" || konu === "" || mesaj === "") {
        alert("JavaScript kontrolü: Lütfen tüm alanları doldurun.");
        return;
    }

    if (!emailRegex.test(email)) {
        alert("JavaScript kontrolü: Geçerli bir e-posta adresi giriniz.");
        return;
    }

    if (!telefonRegex.test(telefon)) {
        alert("JavaScript kontrolü: Telefon alanına sadece rakam giriniz.");
        return;
    }

    alert("JavaScript kontrolü: Form başarıyla doğrulandı.");
}

function vueKontrol() {
    const adsoyad = document.getElementById("adsoyad").value.trim();
    const email = document.getElementById("email").value.trim();
    const telefon = document.getElementById("telefon").value.trim();
    const konu = document.getElementById("konu").value;
    const mesaj = document.getElementById("mesaj").value.trim();

    const { createApp } = Vue;

    const app = createApp({
        data() {
            return {
                adsoyad,
                email,
                telefon,
                konu,
                mesaj
            };
        },
        methods: {
            kontrolEt() {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                const telefonRegex = /^[0-9]+$/;

                if (this.adsoyad === "" || this.email === "" || this.telefon === "" || this.konu === "" || this.mesaj === "") {
                    alert("Vue.js kontrolü: Lütfen tüm alanları doldurun.");
                    return;
                }

                if (!emailRegex.test(this.email)) {
                    alert("Vue.js kontrolü: Geçerli bir e-posta adresi giriniz.");
                    return;
                }

                if (!telefonRegex.test(this.telefon)) {
                    alert("Vue.js kontrolü: Telefon alanına sadece rakam giriniz.");
                    return;
                }

                alert("Vue.js kontrolü: Form başarıyla doğrulandı.");
            }
        },
        mounted() {
            this.kontrolEt();
        }
    });

    const temp = document.createElement("div");
    app.mount(temp);
}
</script>
</body>
</html>
