<section class="login-container">

    <form class="login-form" onsubmit="return loginKontrol()">

        <h1>Hoş Geldin</h1>

        <p class="login-text">
            Siteye giriş yapmak için bilgilerini gir.
        </p>

        <label>Kullanıcı Adı</label>
        <input type="text" id="kullanici" placeholder="Kullanıcı adı">

        <label>Şifre</label>
        <input type="password" id="sifre" placeholder="Şifre">

        <button type="submit">
            Giriş Yap
        </button>

    </form>

</section>

<script>

function loginKontrol(){

    let kullanici =
    document.getElementById("kullanici").value.trim();

    let sifre =
    document.getElementById("sifre").value.trim();

    if(kullanici == "" || sifre == ""){

        alert("Lütfen boş alan bırakmayınız.");
        return false;
    }

    if(kullanici == "b251210020@sakarya.edu.tr"
        &&
       sifre == "b251210020"){

 alert("Hoşgeldiniz b251210020");
        return true;
    }

    else{

        alert("Kullanıcı adı veya şifre hatalı.");
        return false;
    }

}

</script>
